<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body style="background-image: url(https://images.unsplash.com/photo-1509909756405-be0199881695?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);" class="flex justify-center h-screen items-center bg-cover bg-center">

<div class="bg-orange-100 border px-10 py-8 border-4 border-gray-300 shadow-lg shadow-blue-300 rounded-xl text-center animate__animated animate__backInDown m-8 w-80" id="kartu">

    <button class="p-2 bg-blue-600 text-white rounded mt-5 hover:bg-blue-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada" onclick="ubahKartu()">Klik Di sini Bro!</button>

 <audio autoplay loop>

    </audio>



<script
    src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.9.1/tsparticles.confetti.bundle.min.js">
</script>

   <script>

    confetti({
    particleCount: 100,
     spread: 70,
     origin: { y: 0.6 },
    });

        <h2 class="mt-3 animate__animated animate__fadeIn">😄 - - 😘</h2>
        <button 
        class="p-2 bg-slate-600 text-white rounded mt-5 hover:bg-slate-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada" onclick="refresh()">
        Tutup!
        </button>`;

    }

    function refresh() {
        location.reload();
    }
   </script>

</html>
